# docker-compose.yml

version: '3.8'
services:

  postgres:
    image: postgres:18
    restart: always
    environment:
      - POSTGRES_USER=orkestrya
      - POSTGRES_PASSWORD=orkestrya
      - POSTGRES_DB=orkestrya_db
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orkestrya -d orkestrya_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://orkestrya:orkestrya@postgres:5432/orkestrya_db?schema=public
      - NODE_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run start:dev

volumes:
  postgres: